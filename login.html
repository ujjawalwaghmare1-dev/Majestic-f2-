<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Majestic Company</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #240046, #7b2cbf);
        }
        .login-box {
            background: rgba(60, 9, 108, 0.9);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            border: 2px solid #7b2cbf;
        }
        .login-box h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 2px solid #7b2cbf;
            border-radius: 10px;
            color: white;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #7b2cbf;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .login-box button:hover {
            background: #9d4edd;
        }
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }
        .register-link a {
            color: #e0aaff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <input type="text" id="username" placeholder="Username / Mobile Number">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login to Dashboard</button>
            <div class="error-msg" id="errorMsg">Invalid username or password!</div>
            <div class="register-link">
                New user? <a href="#" onclick="showRegister()">Register here</a>
            </div>
        </div>
    </div>

    <script>
        // Admin credentials (stored in localStorage)
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "majestic@123";
        const ADMIN_MOBILE = "9371270065";

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Check admin credentials
            if((username === ADMIN_USERNAME || username === ADMIN_MOBILE) && password === ADMIN_PASSWORD) {
                // Set login session
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userType', 'admin');
                localStorage.setItem('username', username);
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Check regular users from localStorage
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => (u.mobile === username || u.username === username) && u.password === password);
                
                if(user) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userType', 'user');
                    localStorage.setItem('userData', JSON.stringify(user));
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            }
        }

        function showRegister() {
            // Simple register prompt
            const name = prompt("Enter your name:");
            const mobile = prompt("Enter mobile number:");
            const password = prompt("Enter password:");
            
            if(name && mobile && password) {
                const users = JSON.parse(localStorage.getItem('users')) || [];
                users.push({
                    name,
                    mobile,
                    password,
                    registered: new Date().toISOString()
                });
                localStorage.setItem('users', JSON.stringify(users));
                alert('Registration successful! Please login.');
            }
        }
    </script>
</body>
</html>
